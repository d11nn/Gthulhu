{{- if .Values.manager.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gthulhu.fullname" . }}-manager
  labels:
    {{- include "gthulhu.labels" . | nindent 4 }}
    app.kubernetes.io/component: manager
spec:
  type: {{ .Values.manager.service.type }}
  ports:
    - port: {{ .Values.manager.service.port }}
      targetPort: {{ .Values.manager.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "gthulhu.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: manager
{{- end }}
---
{{- if and .Values.scheduler.enabled (or .Values.scheduler.sidecar.enabled .Values.scheduler.monitor.enabled) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gthulhu.fullname" . }}-scheduler-sidecar
  labels:
    {{- include "gthulhu.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  # Headless service for DaemonSet
  clusterIP: None
  ports:
    {{- if .Values.scheduler.sidecar.enabled }}
    - port: {{ .Values.scheduler.sidecar.service.port }}
      targetPort: {{ .Values.scheduler.sidecar.service.targetPort }}
      protocol: TCP
      name: http
    {{- end }}
    {{- if .Values.scheduler.monitor.enabled }}
    - port: {{ .Values.scheduler.monitor.prometheusPort }}
      targetPort: monitor-metrics
      protocol: TCP
      name: monitor-metrics
    {{- end }}
  selector:
    {{- include "gthulhu.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
{{- end }}
