# Default values for gthulhu.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# CRD Namespace Configuration
# This namespace is used to store SchedulingIntent and SchedulingStrategy CRs
crdNamespace:
  create: true
  name: gthulhu-system

mongodb:
  enabled: true

# Gthulhu Scheduler Configuration
scheduler:
  enabled: true
  replicaCount: 1
  # daemon keeps the runtime control API enabled. scheduler runs /gthulhu/main
  # scheduler directly and is used for monitor-only deployments.
  runtimeMode: daemon
  
  image:
    # Use the scx-flavored image so mode=scx can launch bundled /gthulhu/scx_* schedulers.
    repository: ghcr.io/gthulhu/gthulhu-scx
    pullPolicy: Always
    tag: "develop"
  
  # Scheduler requires privileged access for BPF operations
  securityContext:
    privileged: true
    runAsUser: 0
    capabilities:
      add:
        - SYS_ADMIN
        - SYS_RESOURCE
        - SYS_PTRACE
  
  # Host PID namespace is required for scheduler operations
  hostPID: true
  
  # Node selector to ensure deployment on nodes with required kernel version
  nodeSelector:
    kubernetes.io/os: linux
  
  # Resources for the scheduler
  resources:
    limits:
      # cpu: 500m
      memory: 512Mi
    requests:
      # cpu: 100m
      memory: 128Mi
  
  # Tolerations to allow scheduling on any node
  tolerations:
    - operator: Exists

  # Daemon mode configuration (gthulhud)
  daemon:
    controlAddr: ":18080"
    runtimeConfigPath: "/tmp/gthulhu/runtime-config.yaml"
    restartDelay: "2s"

  config:
    nameSuffix: ""
    mode: gthulhu
    kernelMode: true
    maxTimeWatchdog: true
    earlyProcessing: false
    builtinIdle: false

  monitor:
    enabled: true
    bpfObjectPath: /gthulhu/sched_monitor.bpf.o
    collectionIntervalSec: 10
    monitorAll: false
    streamEvents: false
    prometheusPort: 9090
    enableCRDWatcher: false
    kubeConfigPath: ""

  api:
    enabled: true
    authEnabled: true
    interval: 5
  
  # Sidecar container configuration (formerly Decision Maker)
  # Shares PID namespace with the host
  # Finds matching PIDs based on intent from manager
  # Waits for Gthulhu scheduler to periodically fetch policies
  sidecar:
    enabled: true
    
    image:
      repository: ghcr.io/gthulhu/gthulhu-api
      pullPolicy: Always
      tag: "develop"
    
    # Sidecar port configuration
    port: 8080
    targetPort: 8080
    
    # Sidecar needs access to host proc and K8s API
    securityContext:
      privileged: true
      allowPrivilegeEscalation: true
      readOnlyRootFilesystem: false
    
    # Environment variables
    env:
      serverHost: ":8080"
      loggingLevel: "info"
      daemonEndpoint: "http://127.0.0.1:18080"
    
    # Service configuration (headless service for daemonset)
    service:
      port: 8080
      targetPort: 8080
    
    # Health check configuration
    healthCheck:
      enabled: true
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    
    # Resources for the sidecar
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

# Manager Configuration (k8s deployment with replica = 1)
# Manager provides frontend and user-related APIs, accepts user intents
# Manager is a Kubernetes client, knows which pods run on which nodes
manager:
  enabled: true
  replicaCount: 1
  
  image:
    repository: ghcr.io/gthulhu/gthulhu-api
    pullPolicy: Always
    tag: "develop"
  
  # Manager port configuration
  port: 8080
  targetPort: 8080
  
  # Environment variables
  env:
    serverHost: ":8080"
    loggingLevel: "info"
    inCluster: "true"
  
  # Node selector for manager
  nodeSelector:
    kubernetes.io/os: linux
  
  # Tolerations for manager
  tolerations: []
  
  # Service configuration
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  
  # Ingress configuration
  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: gthulhu-manager.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []
    #  - secretName: gthulhu-manager-tls
    #    hosts:
    #      - gthulhu-manager.local
  
  # Health check configuration
  healthCheck:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  # Resources for the manager
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# MongoDB Configuration
mongodb:
  enabled: true
  
  image:
    repository: mongo
    tag: "8.2.2"
    pullPolicy: IfNotPresent
  
  # MongoDB replica set configuration
  replicaSet:
    name: rs0
    replicas: 1
  
  # Authentication
  auth:
    # Existing secret name containing MONGO_INITDB_ROOT_USERNAME and MONGO_INITDB_ROOT_PASSWORD
    existingSecret: ""
    # If existingSecret is not set, use these values
    rootUsername: admin
    rootPassword: changeme
  
  # Database name for manager
  database: manager
  
  # Connection options
  connectionOptions: "authSource=admin&tls=false&directConnection=true"
  
  # Persistence configuration
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi
  
  # Resources for MongoDB
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  
  # Security context
  securityContext:
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999

# mTLS Configuration
# Mutual TLS for secure communication between components:
#   - Manager  → DM sidecar  (cross-node, Manager is client, DM is server)
#   - Scheduler → DM sidecar  (same pod via localhost, Scheduler is client, DM is server)
mtls:
  enabled: false
  # Use an existing Secret instead of the chart-managed one.
  # The Secret must contain keys: ca.crt, dm.crt, dm.key, manager.crt, manager.key
  existingSecret: ""
  # PEM-encoded CA certificate (shared root of trust)
  ca:
    cert: ""
  # DM sidecar server certificate and key (signed by CA)
  dm:
    cert: ""
    key: ""
  # Manager / Scheduler client certificate and key (signed by CA)
  manager:
    cert: ""
    key: ""
  # TLS ServerName override for Manager → DM connections.
  # When set, Go's TLS stack verifies the DM certificate against this name
  # instead of the connection target IP. Use "localhost" since the DM cert
  # has DNS:localhost in its SAN. This avoids dynamic Pod IP issues.
  # Requires api repo support for MTLSConfig.server_name field.
  serverName: "localhost"

# Global configuration
global:
  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""
  # Timezone
  timezone: UTC

# Service Account
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod annotations
podAnnotations: {}

# Additional labels for all resources
additionalLabels: {}

# Node selector for all components (can be overridden per component)
nodeSelector: {}

# Tolerations for all components (can be overridden per component)
tolerations: []

# Affinity for all components (can be overridden per component)  
affinity: {}

# Storage configuration for metrics (if needed in future)
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi

# Monitoring and observability
monitoring:
  enabled: true
  path: /metrics
  serviceMonitor:
    enabled: true
    labels: {}
    interval: 30s

# ── KEDA Auto-Scaling Integration ──
# Requires: KEDA operator installed in the cluster
# Metrics flow: Monitor eBPF → Prometheus → KEDA Prometheus trigger → HPA
keda:
  enabled: false
  # Prometheus server address used by KEDA's prometheus trigger
  prometheusAddress: http://prometheus-kube-prometheus-prometheus.monitoring:9090
  # Example ScaledObject (set enabled=true and configure to deploy)
  example:
    enabled: false
    scaleTargetRef:
      apiVersion: apps/v1
      kind: Deployment
      name: my-workload
    targetNamespace: default
    metricName: gthulhu_pod_voluntary_ctx_switches_total
    threshold: "100"
    pollingInterval: 30
    cooldownPeriod: 300
    minReplicaCount: 1
    maxReplicaCount: 10

# ── Prometheus Adapter Configuration ──
# Maps Gthulhu pod scheduling metrics to Kubernetes custom metrics API
# so HPA / KEDA can query them via the metrics.k8s.io aggregation layer.
prometheusAdapter:
  enabled: false
  # Rules to register custom metrics from Gthulhu's Prometheus metrics
  rules:
    - seriesQuery: 'gthulhu_pod_voluntary_ctx_switches_total{namespace!="",pod_name!=""}'
      resources:
        overrides:
          namespace: {resource: "namespace"}
          pod_name: {resource: "pod"}
      name:
        as: "gthulhu_voluntary_ctx_switches_rate"
      metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>}[5m])) by (<<.GroupBy>>)'
    - seriesQuery: 'gthulhu_pod_cpu_time_nanoseconds_total{namespace!="",pod_name!=""}'
      resources:
        overrides:
          namespace: {resource: "namespace"}
          pod_name: {resource: "pod"}
      name:
        as: "gthulhu_cpu_time_rate"
      metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>}[5m])) by (<<.GroupBy>>)'
    - seriesQuery: 'gthulhu_pod_involuntary_ctx_switches_total{namespace!="",pod_name!=""}'
      resources:
        overrides:
          namespace: {resource: "namespace"}
          pod_name: {resource: "pod"}
      name:
        as: "gthulhu_involuntary_ctx_switches_rate"
      metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>}[5m])) by (<<.GroupBy>>)'
